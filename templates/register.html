{% extends 'base.html' %}
{% block title %}Register — LibraFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-icon"><i data-lucide="user-plus"></i></span>
      <h1>Create Account</h1>
      <p>Join LibraFlow</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" class="form-input" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" required minlength="6">
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role" class="form-input" onchange="toggleRoleField(this.value)">
          <option value="student">Student</option>
          <option value="librarian">Librarian / Admin</option>
        </select>
      </div>
      <div class="form-group" id="student-id-group">
        <label for="student_id">Student ID</label>
        <input type="text" id="student_id" name="student_id" class="form-input" placeholder="e.g. STU001">
      </div>
      <div class="form-group" id="employee-id-group" style="display:none">
        <label for="employee_id">Employee ID</label>
        <input type="text" id="employee_id" name="employee_id" class="form-input" placeholder="e.g. EMP001">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
  </div>
</div>

<script>
function toggleRoleField(role) {
  document.getElementById('student-id-group').style.display = role === 'student' ? '' : 'none';
  document.getElementById('employee-id-group').style.display = role === 'librarian' ? '' : 'none';
}
</script>
{% endblock %}
