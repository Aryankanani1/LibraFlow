{% extends 'base.html' %}
{% block title %}Login — LibraFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-icon"><i data-lucide="library-big"></i></span>
      <h1>LibraFlow</h1>
      <p>Library Management System</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
    </div>

    <div class="demo-credentials">
      <p><strong>Demo accounts:</strong></p>
      <p>Admin: <code>admin@libraflow.com</code> / <code>admin123</code></p>
      <p>Student: <code>student@libraflow.com</code> / <code>student123</code></p>
    </div>
  </div>
</div>
{% endblock %}
