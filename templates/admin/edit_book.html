{% extends 'base.html' %}
{% block title %}Edit Book — LibraFlow{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Edit Book</h2>
  <a href="{{ url_for('admin.books') }}" class="btn btn-outline">← Back</a>
</div>

<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>ISBN</label>
        <input type="text" class="form-input" value="{{ book.isbn }}" disabled>
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" class="form-input" value="{{ book.title }}" required>
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" name="author" class="form-input" value="{{ book.author }}" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category" class="form-input" required>
          <option value="Programming"        {% if book.category == 'Programming' %}selected{% endif %}>Programming</option>
          <option value="Web Development"    {% if book.category == 'Web Development' %}selected{% endif %}>Web Development</option>
          <option value="Software Engineering" {% if book.category == 'Software Engineering' %}selected{% endif %}>Software Engineering</option>
          <option value="Algorithms"         {% if book.category == 'Algorithms' %}selected{% endif %}>Algorithms</option>
          <option value="Machine Learning"   {% if book.category == 'Machine Learning' %}selected{% endif %}>Machine Learning</option>
          <option value="Data Science"       {% if book.category == 'Data Science' %}selected{% endif %}>Data Science</option>
          <option value="Databases"          {% if book.category == 'Databases' %}selected{% endif %}>Databases</option>
          <option value="Computer Science"   {% if book.category == 'Computer Science' %}selected{% endif %}>Computer Science</option>
          <option value="Cybersecurity"      {% if book.category == 'Cybersecurity' %}selected{% endif %}>Cybersecurity</option>
          <option value="DevOps"             {% if book.category == 'DevOps' %}selected{% endif %}>DevOps</option>
          <option value="Operating Systems"  {% if book.category == 'Operating Systems' %}selected{% endif %}>Operating Systems</option>
          <option value="Networking"         {% if book.category == 'Networking' %}selected{% endif %}>Networking</option>
          <option value="Mathematics"        {% if book.category == 'Mathematics' %}selected{% endif %}>Mathematics</option>
          <option value="Computers"          {% if book.category == 'Computers' %}selected{% endif %}>Computers</option>
          <option value="General"            {% if book.category == 'General' %}selected{% endif %}>General</option>
        </select>
      </div>
      <div class="form-group">
        <label>Publisher</label>
        <input type="text" name="publisher" class="form-input" value="{{ book.publisher or '' }}">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('admin.books') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
