{% extends 'base.html' %}
{% block title %}Edit Book — LibraFlow{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Edit Book</h2>
  <a href="{{ url_for('admin.books') }}" class="btn btn-outline">← Back</a>
</div>

<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>ISBN</label>
        <input type="text" class="form-input" value="{{ book.isbn }}" disabled>
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" class="form-input" value="{{ book.title }}" required>
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" name="author" class="form-input" value="{{ book.author }}" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" class="form-input" value="{{ book.category }}" required>
      </div>
      <div class="form-group">
        <label>Publisher</label>
        <input type="text" name="publisher" class="form-input" value="{{ book.publisher or '' }}">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('admin.books') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
